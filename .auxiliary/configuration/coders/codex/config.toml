model = "gpt-5.5"
model_reasoning_effort = "medium"
personality = "friendly"

approval_policy = "on-request"
sandbox_mode = "workspace-write"
approvals_reviewer = "user"
trust_level = "trusted"
# web_search = "cached"

[features]
# Temporary mitigation for Bubblewrap/symlink approval-loop regressions.
# Related issues: #14936 and #14694.
use_legacy_landlock = true
# Keep reviewer routing explicit: always surface approval requests to user.
guardian_approval = false

## MCP Servers

[mcp_servers.agentmux]
command = "agentmux"
args = ["host", "mcp", "--bundle", "ai-experiments"]
startup_timeout_sec = 60
tool_timeout_sec = 900

[mcp_servers.agentmux.tools.list]
approval_mode = "approve"

[mcp_servers.agentmux.tools.look]
approval_mode = "approve"

[mcp_servers.agentmux.tools.send]
approval_mode = "approve"

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]

[mcp_servers.context7.tools.query_docs]
approval_mode = "approve"

[mcp_servers.context7.tools.resolve_library_id]
approval_mode = "approve"

[mcp_servers.nb]
command = "nb-mcp"
args = ["--notebook", "ai-experiments", "--no-commit-signing"]

[mcp_servers.nb.tools.help]
approval_mode = "approve"

[mcp_servers.nb.tools.nb]
approval_mode = "approve"
