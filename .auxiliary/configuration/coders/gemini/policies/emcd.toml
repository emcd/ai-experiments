# Gemini CLI Policy Engine rules.
# Mirrors prior tools.allowed behavior without using deprecated settings keys.

[[rule]]
toolName = [
  "mcp__agentmux__list",
  "mcp__agentmux__look",
  "mcp__agentmux__send",
  "mcp__context7__get-library-docs",
  "mcp__context7__resolve-library-id",
  "mcp__nb__help",
  "mcp__nb__nb",
  "edit",
  "glob",
  "google_web_search",
  "list_directory",
  "read_file",
  "replace",
  "save_memory",
  "search_file_content",
  "web_fetch",
  "write_file",
  "write_todos",
]
decision = "allow"
priority = 300

[[rule]]
toolName = "run_shell_command"
commandPrefix = [
  "hatch run",
  "hatch --env develop run",
  "awk",
  "cat",
  "cut",
  "df",
  "du",
  "echo",
  "file",
  "find",
  "gh browse",
  "gh issue list",
  "gh issue view",
  "gh pr checks",
  "gh pr list",
  "gh pr view",
  "gh release list",
  "gh release view",
  "gh repo list",
  "gh repo view",
  "gh run list",
  "gh run view",
  "gh run watch",
  "gh search issues",
  "gh status",
  "git add",
  "git branch",
  "git checkout",
  "git diff",
  "git fetch",
  "git log",
  "git rebase",
  "git restore",
  "git rev-parse",
  "git show",
  "git stash list",
  "git status",
  "grep",
  "head",
  "ls",
  "mkdir",
  "ps",
  "pwd",
  "rg",
  "sed",
  "sort",
  "tail",
  "uniq",
  "wc",
  "which",
]
decision = "allow"
priority = 300
